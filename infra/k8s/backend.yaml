apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: multi-agent-trading
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/frostwane/multi-agent-trading-system-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: trading-config
            - secretRef:
                name: trading-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: multi-agent-trading
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000

services:
  qdrant:
    image: qdrant/qdrant:v1.9.7
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      CORS_ORIGINS: http://localhost:5173,http://localhost:8080,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    depends_on:
      - qdrant

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  qdrant_storage:
